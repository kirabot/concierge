<article class="cvDoc">
  <style>
    @import url("https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Playfair+Display:wght@700;800&display=swap");

    .cvDoc {
      position: relative;
      min-height: 297mm;
      padding: 18mm 16mm 16mm;
      color: #17130f;
      font-family: "Inter", "Segoe UI", sans-serif;
      line-height: 1.35;
      background:
        radial-gradient(circle at top right, rgba(15, 95, 87, 0.08), transparent 18%),
        linear-gradient(180deg, #fffdf8 0%, #fffaf2 100%);
    }

    .cvDoc::before {
      content: "";
      position: absolute;
      inset: 0 0 auto;
      height: 9mm;
      background: linear-gradient(90deg, #0f5f57 0%, #c96d3a 72%, transparent 100%);
    }

    .cvHeader {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 320px;
      column-gap: 18px;
      row-gap: 8px;
      grid-template-rows: repeat(5, auto);
      padding-top: 6mm;
      border-bottom: 1px solid rgba(23, 19, 15, 0.14);
      padding-bottom: 7mm;
      align-items: stretch;
    }

    .nameBlock {
      grid-column: 1;
      grid-row: 1 / span 2;
      min-width: 0;
      align-self: stretch;
      display: flex;
      align-items: flex-start;
    }

    .cvName {
      margin: 0;
      font-size: 48px;
      line-height: 0.9;
      letter-spacing: 0.01em;
      font-family: "Canela", "Playfair Display", Georgia, serif;
      font-weight: 700;
      white-space: nowrap;
    }

    .cvHeadline {
      font-size: 17px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: #0f5f57;
      font-family: "Inter", "Segoe UI", sans-serif;
      font-weight: 700;
      white-space: nowrap;
      display: inline-block;
      max-width: 100%;
    }

    .headlineBlock {
      grid-column: 1;
      grid-row: 3;
      align-self: center;
    }

    .locationBlock {
      grid-column: 1;
      grid-row: 4;
      align-self: center;
    }

    .cvLocation {
      color: #564d43;
      font: 600 12px "Inter", "Segoe UI", sans-serif;
      letter-spacing: 0.01em;
    }

    .cvTarget {
      display: inline-flex;
      align-items: center;
      justify-content: flex-start;
      padding: 5px 10px;
      border-radius: 999px;
      background: rgba(15, 95, 87, 0.08);
      font-size: 13px;
      color: #564d43;
      font-family: "Inter", "Segoe UI", sans-serif;
      width: 100%;
      min-height: 100%;
      box-sizing: border-box;
    }

    .contactStack,
    .skillGrid {
      display: flex;
      flex-wrap: wrap;
    }

    .contactStack {
      grid-column: 2;
      grid-row: 1 / span 2;
      display: grid;
      grid-template-columns: 1fr;
      grid-template-rows: repeat(2, auto);
      gap: 6px;
      align-content: start;
    }

    .inlineLinks {
      grid-column: 2;
      grid-row: 3 / span 3;
      display: grid;
      grid-template-columns: 1fr;
      grid-template-rows: repeat(3, auto);
      gap: 6px;
      align-content: start;
    }

    .contactChip,
    .skillPill {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 5px 10px;
      border-radius: 999px;
      background: rgba(15, 95, 87, 0.08);
      color: #0f5f57;
      font: 600 11px "Inter", "Segoe UI", sans-serif;
      text-decoration: none;
      transition: background 140ms ease, border-color 140ms ease, color 140ms ease;
    }

    .contactStack .contactChip {
      justify-content: center;
      width: 100%;
      text-align: center;
    }

    .inlineLinks .contactChip {
      justify-content: center;
      width: 100%;
      text-align: center;
    }

    .targetBlock {
      grid-column: 1;
      grid-row: 5;
      align-self: end;
      display: flex;
    }

    .contactChip:visited,
    .contactChip:hover,
    .contactChip:active,
    .contactChip:focus-visible {
      color: inherit;
      text-decoration: none;
    }

    .contactChip:hover,
    .contactChip:focus-visible {
      background: rgba(15, 95, 87, 0.14);
      outline: 1px solid rgba(15, 95, 87, 0.35);
      outline-offset: 0;
    }

    .summaryBlock {
      margin-top: 8mm;
      padding: 0 0 5mm;
      border-bottom: 1px solid rgba(23, 19, 15, 0.12);
    }

    .summaryText {
      margin: 0;
      font-size: 13px;
      line-height: 1.6;
      color: #241e18;
    }

    .sections {
      display: grid;
      gap: 6mm;
      padding-top: 7mm;
    }

    .pageSpacer {
      position: relative;
      border: 1px dashed rgba(15, 95, 87, 0.24);
      border-radius: 14px;
      background: rgba(15, 95, 87, 0.04);
      break-inside: avoid;
      page-break-inside: avoid;
    }

    .pageSpacer::before {
      content: attr(data-label);
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font: 700 10px "Inter", "Segoe UI", sans-serif;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: rgba(15, 95, 87, 0.72);
    }

    .cvSection {
      display: grid;
      gap: 3.4mm;
    }

    .sectionHeading {
      margin: 0;
      font: 800 11px "Inter", "Segoe UI", sans-serif;
      letter-spacing: 0.2em;
      color: #0f5f57;
      text-transform: uppercase;
    }

    .itemList {
      display: grid;
      gap: 3.5mm;
    }

    .entry {
      display: grid;
      gap: 1.2mm;
    }

    .entryTop {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 8px;
      align-items: baseline;
    }

    .entryTitle {
      margin: 0;
      font-size: 15px;
      font-family: "Canela", "Playfair Display", Georgia, serif;
      font-weight: 700;
    }

    .entryTitle a,
    .entrySubtitle a {
      color: inherit;
      text-decoration: none;
      border-bottom: 1px solid rgba(15, 95, 87, 0.28);
    }

    .entryTitle a:hover,
    .entrySubtitle a:hover {
      border-bottom-color: rgba(15, 95, 87, 0.72);
    }

    .entrySubtitle {
      font: 600 11px "Inter", "Segoe UI", sans-serif;
      color: #5f5448;
      letter-spacing: 0.03em;
    }

    .entryMeta {
      font: 600 11px "Inter", "Segoe UI", sans-serif;
      color: #705f4c;
      text-align: right;
    }

    .entrySummary {
      margin: 0;
      font-size: 12px;
      color: #433a31;
    }

    .bulletList {
      margin: 0;
      padding-left: 17px;
      display: grid;
      gap: 1.2mm;
      font-size: 12px;
      color: #211c17;
    }

    @media print {
      .pageSpacer {
        border: 0;
        background: transparent;
      }

      .pageSpacer::before {
        content: none;
      }
    }
  </style>

  <header class="cvHeader">
    <div class="nameBlock">
      <h1 class="cvName" data-field="header.name"></h1>
    </div>
    <div class="headlineBlock">
      <div class="cvHeadline" data-field="header.headline"></div>
    </div>
    <div class="locationBlock">
      <div class="cvLocation" data-field="header.location"></div>
    </div>
    <div class="contactStack" data-slot="contact"></div>
    <div class="targetBlock">
      <div class="cvTarget" data-field="header.target_line"></div>
    </div>
    <div class="inlineLinks" data-slot="links"></div>
  </header>

  <section class="summaryBlock">
    <p class="summaryText" data-field="summary"></p>
  </section>

  <section class="sections" data-slot="sections"></section>
</article>
